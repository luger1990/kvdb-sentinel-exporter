# KVDB Sentinel Exporter 配置文件

# Redis哨兵配置
sentinels:
  # 第一个哨兵组
  redis-sentinel-group-1:
    # 本组Redis默认密码（可选，当master没有单独指定密码时使用此密码）
    default_password: "${REDIS_GROUP_1_PASSWORD}"
    sentinel_hosts:
      - "127.0.0.1:26379"
      - "127.0.0.1:26380"
      - "127.0.0.1:26391"
    # 为特定master_name指定密码配置（会覆盖默认密码）
    master_groups:
      # 示例：为特定master_name设置专用密码
      kvrocks-group-1:
        password: "${KVROCKS_GROUP_1_PASSWORD}"
      # 注意：未在此处列出的master_name将使用default_password
  
  # 第二个哨兵组
  redis-sentinel-group-2:
    # 本组Redis默认密码（可选）
    default_password: ""
    sentinel_hosts:
      - "127.0.0.1:46379"
      - "127.0.0.1:46380"
      - "127.0.0.1:46381"

# 指标收集配置
metrics:
  # 收集线程池大小
  thread_pool_size: 10
  # 连接超时时间（秒）
  connect_timeout: 3
  # 读取超时时间（秒）
  read_timeout: 5
  # Sentinel master发现结果缓存时间（秒）
  discovery_ttl: 30

# Web UI配置
web_ui:
  # 刷新间隔（秒）
  refresh_interval: 30
  # 是否加载第三方统计脚本
  analytics_enabled: false

# Web Terminal配置
terminal:
  # 是否启用Redis Web Terminal
  enabled: true
  # 禁止在Web Terminal中执行的命令，命令名大小写不敏感
  blocked_commands:
    - acl
    - bgrewriteaof
    - bgsave
    - config
    - debug
    - failover
    - flushall
    - flushdb
    - lastsave
    - migrate
    - module
    - monitor
    - replicaof
    - restore
    - save
    - shutdown
    - slaveof
    - sync
